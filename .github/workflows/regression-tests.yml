name: Daily Regression Testing

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  APP_ENV: testing
  APP_DEBUG: true
  APP_URL: http://localhost:8000
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: photographar_test
  DB_USERNAME: root
  DB_PASSWORD: root

jobs:
  regression-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: photographar_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, pdo_mysql

    - name: Install Composer Dependencies
      run: composer install --no-interaction --no-progress

    - name: Copy Environment File
      run: cp .env.example .env.testing

    - name: Generate Application Key
      run: php artisan key:generate --env=testing

    - name: Run Database Migrations
      run: php artisan migrate:fresh --env=testing --force

    - name: Seed Complete Dataset
      run: php artisan db:seed --env=testing --force

    - name: Run Full Test Suite
      run: php artisan test tests/Feature --env=testing

    - name: Generate Test Report
      if: always()
      run: php artisan test --env=testing --coverage --coverage-html=coverage-report

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: regression-test-report
        path: coverage-report/

    - name: Notify Slack on Failure
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "Regression tests failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": ":x: Daily regression tests failed\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
