name: Automated QA Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  APP_ENV: testing
  APP_DEBUG: true
  APP_URL: http://localhost:8000
  DB_CONNECTION: mysql
  DB_HOST: 127.0.0.1
  DB_PORT: 3306
  DB_DATABASE: photographar_test
  DB_USERNAME: root
  DB_PASSWORD: root

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: photographar_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, mysql, pdo_mysql
        coverage: xdebug

    - name: Validate composer.json
      run: composer validate

    - name: Cache composer packages
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Install Composer Dependencies
      run: composer install --no-interaction --no-progress --prefer-dist

    - name: Copy Environment File
      run: cp .env.example .env.testing

    - name: Generate Application Key
      run: php artisan key:generate --env=testing

    - name: Run Database Migrations
      run: php artisan migrate:fresh --env=testing --force

    - name: Seed Test Data
      run: php artisan db:seed --class=Database\\Seeders\\BangladeshDivisionSeeder --env=testing --force

    - name: Seed Photography Categories
      run: php artisan db:seed --class=Database\\Seeders\\PhotographyCategorySeeder --env=testing --force

    - name: Seed Test Data
      run: php artisan db:seed --class=Database\\Seeders\\TestDataSeeder --env=testing --force

    - name: Create Storage Link
      run: php artisan storage:link

    - name: Run Route Health Check Tests
      run: php artisan test tests/Feature/RouteHealthCheckTest.php --env=testing -v

    - name: Run Competition Admin CRUD Tests
      run: php artisan test tests/Feature/CompetitionAdminCrudTest.php --env=testing -v

    - name: Run Competition Submission & Voting Tests
      run: php artisan test tests/Feature/CompetitionSubmissionVotingTest.php --env=testing -v

    - name: Run Event Admin CRUD Tests
      run: php artisan test tests/Feature/EventAdminCrudTest.php --env=testing -v

    - name: Run Event Registration & Attendance Tests
      run: php artisan test tests/Feature/EventRegistrationAttendanceTest.php --env=testing -v

    - name: Run Verification Flow Tests
      run: php artisan test tests/Feature/VerificationFlowTest.php --env=testing -v

    - name: Run Booking Flow Tests
      run: php artisan test tests/Feature/BookingFlowTest.php --env=testing -v

    - name: Run Judge Scoring Flow Tests
      run: php artisan test tests/Feature/JudgeScoringFlowTest.php --env=testing -v

    - name: Run All Tests with Coverage
      run: php artisan test --env=testing --coverage

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          storage/logs/
          coverage.xml

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2

    - name: Install Composer Dependencies
      run: composer install --no-interaction --no-progress

    - name: Run Pint (Code Style)
      run: ./vendor/bin/pint --test || true

    - name: Run Laravel Insights
      run: php artisan insights --no-interaction || true
