<!DOCTYPE html>
<html>
<head>
    <title>Competition Test Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-2xl font-bold mb-6">🏆 Competition Data Test</h1>
        
        <div id="status" class="mb-6 p-4 rounded"></div>
        
        <div class="mb-6">
            <button onclick="testAPI()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mr-2">
                Test API
            </button>
            <button onclick="loginAndRedirect()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded">
                Login & Go to Competitions
            </button>
        </div>
        
        <div id="results" class="space-y-4"></div>
    </div>

    <script>
        async function testAPI() {
            const statusDiv = document.getElementById('status');
            const resultsDiv = document.getElementById('results');
            
            statusDiv.className = 'mb-6 p-4 rounded bg-blue-50 border border-blue-200';
            statusDiv.textContent = 'Testing API...';
            
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                statusDiv.className = 'mb-6 p-4 rounded bg-red-50 border border-red-200';
                statusDiv.innerHTML = '❌ No auth token found! <a href="/quick-login.php" class="text-blue-600 underline">Click here to login</a>';
                return;
            }
            
            try {
                const response = await fetch('/api/v1/admin/competitions', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    statusDiv.className = 'mb-6 p-4 rounded bg-green-50 border border-green-200';
                    statusDiv.textContent = `✅ Success! Found ${data.data.length} competitions`;
                    
                    resultsDiv.innerHTML = '<h2 class="font-bold text-lg mb-4">Competitions:</h2>';
                    data.data.forEach(comp => {
                        resultsDiv.innerHTML += `
                            <div class="border rounded p-4 mb-2">
                                <h3 class="font-bold">${comp.title}</h3>
                                <div class="text-sm text-gray-600 mt-1">
                                    <span class="inline-block px-2 py-1 rounded text-xs ${
                                        comp.status === 'active' ? 'bg-green-100 text-green-800' :
                                        comp.status === 'draft' ? 'bg-gray-100 text-gray-800' :
                                        comp.status === 'judging' ? 'bg-blue-100 text-blue-800' :
                                        'bg-purple-100 text-purple-800'
                                    }">${comp.status}</span>
                                    <span class="ml-2">Prize Pool: ৳${(comp.total_prize_pool || 0).toLocaleString()}</span>
                                    <span class="ml-2">Submissions: ${comp.submissions_count || 0}</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    statusDiv.className = 'mb-6 p-4 rounded bg-red-50 border border-red-200';
                    statusDiv.textContent = `❌ Error: ${data.message || 'Failed to load competitions'}`;
                }
            } catch (error) {
                statusDiv.className = 'mb-6 p-4 rounded bg-red-50 border border-red-200';
                statusDiv.textContent = `❌ Error: ${error.message}`;
            }
        }
        
        function loginAndRedirect() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = '/quick-login.php';
            } else {
                window.location.href = '/admin/competitions';
            }
        }
        
        // Auto-test on load
        if (localStorage.getItem('auth_token')) {
            testAPI();
        } else {
            document.getElementById('status').className = 'mb-6 p-4 rounded bg-yellow-50 border border-yellow-200';
            document.getElementById('status').innerHTML = '⚠️ Not logged in. <a href="/quick-login.php" class="text-blue-600 underline">Click here to login</a>';
        }
    </script>
</body>
</html>
